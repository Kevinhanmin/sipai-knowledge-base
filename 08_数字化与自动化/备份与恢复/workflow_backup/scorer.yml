name: 评分师云端报告生成

on:
  repository_dispatch:
    types: [feishu-new-record]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  score-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行评分师（生成报告 + 暂存通知）
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          BITABLE_APP_TOKEN: ${{ secrets.BITABLE_APP_TOKEN }}
          TABLE_ID: ${{ secrets.TABLE_ID }}
          FOUNDER_OPEN_ID: ${{ secrets.FOUNDER_OPEN_ID }}
          REPO_URL: ${{ secrets.REPO_URL }}
        run: python scorer_cloud.py || echo "⚠️ 评分运行有警告，但不影响提交"

      - name: 提交报告到仓库
        run: |
          git config user.name "评分师机器人"
          git config user.email "scorer@bot.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "没有新报告"
          else
            git commit -m "📊 自动诊断报告 $(date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: 发送飞书通知（等文件部署后再发）
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FOUNDER_OPEN_ID: ${{ secrets.FOUNDER_OPEN_ID }}
        run: |
          sleep 30  # 等待GitHub Pages部署（约30秒）
          python scorer_cloud.py --notify || echo "⚠️ 通知发送有警告"
